name: clang-tidy

on:
  push:
    branches: [main]
  pull_request:

jobs:
  clang-tidy:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            clang-18 clang-tidy-18 cmake ninja-build libgtest-dev

      - name: Configure (generate compile_commands.json)
        run: |
          cmake -G Ninja -B build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_COMPILER=clang++-18 \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: Run clang-tidy
        run: |
          # Collect all project source files (exclude third-party / build dirs)
          find nova/include nova_extras/include nova_extras/src flare/include flare/src \
            -name "*.cpp" -o -name "*.h" \
            | grep -v "build/" \
            > files.txt

          # clang-tidy exits non-zero if any check fires
          # --warnings-as-errors promotes all enabled checks to errors
          #
          # The included rules are best-effort coverage of MISRA C++ 2008 guidelines.
          # A successful pass is not a claim of MISRA compliance; full MISRA
          # compliance requires a commercial tool.
          #
          # Outlined below are the various check groups:
          # - Bugprone
          # - CERT
          # - Clang Static Analyzer
          # - Concurrency
          # - C++ Core Guidelines
          # - HIC++
          # - Misc
          # - Modernize
          # - Readability
          #
          # -- Intentionally excluded ----------------------------------------
          # The following checks have MISRA relevance but are disabled because
          # they fire on legitimate constructs in Nova's codebase and require
          # a suppression strategy before enabling:
          #
          # readability-magic-numbers / cppcoreguidelines-avoid-magic-numbers
          #   MISRA 5-0-*  These are aliased checks. They fire on template
          #   parameters (e.g. MemoryPool<2097152ul, 16384ul>) and physical
          #   constants throughout the codebase. Enable once NOVA_POOL_SIZE
          #   and similar named constants are in place at all call sites.
          #
          # bugprone-easily-swappable-parameters
          #   MISRA 8-4-*  High false-positive rate on sink/formatter
          #   constructors that take multiple size_t parameters by design.
          #
          # cppcoreguidelines-pro-bounds-pointer-arithmetic
          #   Fires on both explicit ptr+n arithmetic and operator[] subscripting of
          #   raw buffers. Nova's internal buffers are fixed-size with explicit bounds
          #   checking; the violations are controlled and reviewable. Cannot be
          #   resolved without std::array which is not always possible (e.g.
          #   TruncatingBuffer). Retain pro-bounds-array-to-pointer-decay and
          #   pro-bounds-constant-array-index as the more targeted alternatives.
          #
          clang-tidy-18 \
            -p build \
            --warnings-as-errors="*" \
            --checks="\
              bugprone-assignment-in-if-condition,\
              bugprone-assert-side-effect,\
              bugprone-branch-clone,\
              bugprone-casting-through-void,\
              bugprone-chained-comparison,\
              bugprone-dynamic-static-initializers,\
              bugprone-implicit-widening-of-multiplication-result,\
              bugprone-incorrect-roundings,\
              bugprone-infinite-loop,\
              bugprone-integer-division,\
              bugprone-macro-parentheses,\
              bugprone-macro-repeated-side-effects,\
              bugprone-misplaced-widening-cast,\
              bugprone-multiple-statement-macro,\
              bugprone-narrowing-conversions,\
              bugprone-no-escape,\
              bugprone-reserved-identifier,\
              bugprone-signed-char-misuse,\
              bugprone-sizeof-expression,\
              bugprone-spuriously-wake-up-functions,\
              bugprone-suspicious-enum-usage,\
              bugprone-suspicious-memset-usage,\
              bugprone-suspicious-missing-comma,\
              bugprone-suspicious-semicolon,\
              bugprone-suspicious-string-compare,\
              bugprone-switch-missing-default-case,\
              bugprone-too-small-loop-variable,\
              bugprone-undefined-memory-manipulation,\
              bugprone-unsafe-functions,\
              bugprone-unused-return-value,\
              bugprone-use-after-move,\
              cert-dcl03-c,\
              cert-dcl50-cpp,\
              cert-dcl58-cpp,\
              cert-err33-c,\
              cert-err52-cpp,\
              cert-err58-cpp,\
              cert-err60-cpp,\
              cert-exp42-c,\
              cert-flp30-c,\
              cert-mem57-cpp,\
              cert-msc50-cpp,\
              cert-msc51-cpp,\
              cert-oop57-cpp,\
              cert-oop58-cpp,\
              cert-str34-c,\
              clang-analyzer-core.*,\
              clang-analyzer-cplusplus.*,\
              clang-analyzer-deadcode.*,\
              clang-analyzer-optin.cplusplus.*,\
              clang-analyzer-security.*,\
              clang-analyzer-unix.*,\
              concurrency-mt-unsafe,\
              concurrency-thread-canceltype-asynchronous,\
              cppcoreguidelines-avoid-c-arrays,\
              cppcoreguidelines-avoid-goto,\
              cppcoreguidelines-init-variables,\
              cppcoreguidelines-interfaces-global-init,\
              cppcoreguidelines-macro-usage,\
              cppcoreguidelines-narrowing-conversions,\
              cppcoreguidelines-no-malloc,\
              cppcoreguidelines-pro-bounds-array-to-pointer-decay,\
              cppcoreguidelines-pro-bounds-constant-array-index,\
              cppcoreguidelines-pro-type-const-cast,\
              cppcoreguidelines-pro-type-cstyle-cast,\
              cppcoreguidelines-pro-type-member-init,\
              cppcoreguidelines-pro-type-reinterpret-cast,\
              cppcoreguidelines-pro-type-static-cast-downcast,\
              cppcoreguidelines-pro-type-union-access,\
              cppcoreguidelines-pro-type-vararg,\
              cppcoreguidelines-slicing,\
              cppcoreguidelines-special-member-functions,\
              cppcoreguidelines-virtual-class-destructor,\
              hicpp-avoid-goto,\
              hicpp-exception-baseclass,\
              hicpp-multiway-paths-covered,\
              hicpp-no-assembler,\
              hicpp-signed-bitwise,\
              hicpp-uppercase-literal-suffix,\
              hicpp-vararg,\
              misc-const-correctness,\
              misc-misleading-bidirectional,\
              misc-misplaced-const,\
              misc-no-recursion,\
              misc-redundant-expression,\
              misc-static-assert,\
              misc-throw-by-value-catch-by-reference,\
              misc-unconventional-assign-operator,\
              misc-unused-alias-decls,\
              misc-unused-using-decls,\
              modernize-use-default-member-init,\
              modernize-use-nullptr,\
              modernize-use-override,\
              modernize-use-using,\
              performance-enum-size,\
              performance-no-int-to-ptr,\
              performance-noexcept-destructor,\
              performance-noexcept-move-constructor,\
              performance-noexcept-swap,\
              performance-trivially-destructible,\
              portability-std-allocator-const,\
              readability-braces-around-statements,\
              readability-const-return-type,\
              readability-else-after-return,\
              readability-function-cognitive-complexity,\
              readability-identifier-length,\
              readability-implicit-bool-conversion,\
              readability-inconsistent-declaration-parameter-name,\
              readability-isolate-declaration,\
              readability-misleading-indentation,\
              readability-misplaced-array-index,\
              readability-qualified-auto,\
              readability-redundant-casting,\
              readability-simplify-boolean-expr,\
              readability-suspicious-call-argument,\
              readability-uppercase-literal-suffix" \
            $(cat files.txt)
