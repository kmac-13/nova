# LibFuzzer workflow - commented out until fuzz targets are implemented.
#
# LibFuzzer requires dedicated fuzz target executables, each providing:
#
#   extern "C" int LLVMFuzzerTestOneInput( const uint8_t* data, size_t size )
#   {
#       // exercise Nova API with fuzzer-supplied bytes
#       return 0;
#   }
#
# These cannot share a GTest harness since LibFuzzer replaces main().
# Add fuzz targets under fuzz/ (e.g. fuzz/fuzz_record_builder.cpp) and
# register them in fuzz/CMakeLists.txt using add_nova_fuzz_target() before
# enabling this workflow.
#
# Suggested fuzz targets:
#   fuzz_record_builder     - feed arbitrary bytes to TruncatingRecordBuilder
#   fuzz_continuation_builder - feed arbitrary bytes to ContinuationRecordBuilder
#   fuzz_iso8601_formatter  - feed arbitrary Records to ISO8601Formatter
#   fuzz_flare_reader       - feed arbitrary bytes to Flare reader/scanner
#
# To run locally:
#   cmake -B build -DCMAKE_CXX_COMPILER=clang++ \
#     -DCMAKE_CXX_FLAGS="-fsanitize=fuzzer,address -fno-omit-frame-pointer" \
#     -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=fuzzer,address" \
#     -DNOVA_BUILD_FUZZ=ON
#   cmake --build build
#   ./build/fuzz/fuzz_record_builder -max_total_time=60

