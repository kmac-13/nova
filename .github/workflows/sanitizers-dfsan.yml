name: DataFlowSanitizer Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  dfsan:
    name: DFSan - Track data flow
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake clang lld

      - name: Configure with DFSan
        run: |
          mkdir build
          cd build
          cmake .. \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DCMAKE_CXX_FLAGS="-fsanitize=dataflow" \
            -DCMAKE_CXX_LINK_FLAGS="-fsanitize=dataflow" \
            -DNOVA_BUILD_TESTS=ON \
            -DNOVA_BUILD_EXAMPLES=OFF
      
      - name: Build
        run: cmake --build build --config Debug

      - name: Run tests with DFSan
        run: cd build && ctest --output-on-failure
        env:
          DFSAN_OPTIONS: >-
            halt_on_error=1:
            color=always
