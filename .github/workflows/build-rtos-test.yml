name: Build / RTOS (Test)

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    name: ${{ matrix.name }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:

          # ----------------------------------------------------------------
          # POSIX simulator - hosted Linux, native execution, no QEMU
          # ----------------------------------------------------------------
          # Builds test_nova_rtos against the FreeRTOS GCC_POSIX port and
          # runs it directly on the GitHub Actions runner.  This exercises
          # the NOVA_RTOS / NOVA_NO_TLS compilation path and verifies that
          # Nova core delivers records correctly from a FreeRTOS task context
          # on a hosted platform.
          #
          # The POSIX port runs FreeRTOS tasks as pthreads on the host OS.
          # It is not a real-time simulator, but it is sufficient to verify
          # that Nova's stack-based logging path, RamSink delivery, and
          # ScopedConfigurator teardown all work correctly under a FreeRTOS
          # scheduler.
          - name: RTOS / FreeRTOS POSIX / Test
            rtos_cross: false
            install: sudo apt-get install -y gcc-13 g++-13
            cc:  gcc-13
            cxx: g++-13

          # ----------------------------------------------------------------
          # ARM Cortex-M3 - cross-compiled, executed under QEMU
          # ----------------------------------------------------------------
          # Cross-compiles test_nova_rtos for Cortex-M3 (lm3s6965evb) and
          # runs it under qemu-system-arm.  This is about as close CI can
          # get to a real embedded target without hardware.
          #
          # The lm3s6965evb machine is chosen because:
          #   - It is QEMU's canonical FreeRTOS demo target (Cortex-M3,
          #     matches the GCC_ARM_CM3 port)
          #   - It has no peripheral dependencies that require stub drivers
          #   - semihosting exit (bkpt #0xAB / SYS_EXIT) is well-supported
          #     in QEMU's lm3s6965evb model
          #
          # Pass/fail is communicated via the semihosting SYS_EXIT call in
          # semihostingExit(), which QEMU translates to a host process exit
          # code that GitHub Actions reads as the step result.
          #
          # Timeout: 30 s is generous for a binary that does no I/O and
          # exits immediately after the test task completes.  A hang (e.g.
          # scheduler startup failure or infinite loop in Default_Handler)
          # will be caught by the timeout rather than blocking the runner.
          - name: RTOS / FreeRTOS ARM Cortex-M3 / QEMU / Test
            rtos_cross: true
            install: |
              sudo apt-get install -y gcc-arm-none-eabi qemu-system-arm

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install toolchain and dependencies
        run: |
          sudo apt-get update -qq
          ${{ matrix.install }}

      - name: Set up CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.28'

      # ----------------------------------------------------------------
      # Configure - POSIX (hosted)
      # ----------------------------------------------------------------
      - name: Configure (POSIX)
        if: '!matrix.rtos_cross'
        run: |
          cmake -B build/rtos-test \
            -S tests/rtos \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=${{ matrix.cc }} \
            -DCMAKE_CXX_COMPILER=${{ matrix.cxx }}

      # ----------------------------------------------------------------
      # Configure - ARM Cortex-M3 cross-compile
      # ----------------------------------------------------------------
      - name: Configure (ARM Cortex-M3)
        if: matrix.rtos_cross
        run: |
          cmake -B build/rtos-test \
            -S tests/rtos \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE=cmake/toolchains/arm-none-eabi-cortex-m3.cmake

      # ----------------------------------------------------------------
      # Build
      # ----------------------------------------------------------------
      - name: Build
        run: cmake --build build/rtos-test --parallel

      # ----------------------------------------------------------------
      # Run - POSIX (direct execution)
      # ----------------------------------------------------------------
      - name: Run tests (POSIX)
        if: '!matrix.rtos_cross'
        run: ./build/rtos-test/test_nova_rtos

      # ----------------------------------------------------------------
      # Run - ARM Cortex-M3 under QEMU with semihosting
      # ----------------------------------------------------------------
      # Flags:
      #   -machine lm3s6965evb  : Stellaris LM3S6965 evaluation board
      #                           (Cortex-M3, matches GCC_ARM_CM3 port)
      #   -nographic            : suppress SDL/VGA window (CI has no display)
      #   -semihosting          : enable ARM semihosting so semihostingExit()
      #                           (bkpt #0xAB / SYS_EXIT) translates to a
      #                           host process exit code
      #   -semihosting-config target=native : host intercepts semihosting
      #                           calls directly (as opposed to gdbserver mode)
      #   -kernel               : ELF binary to load (QEMU reads the ELF
      #                           headers and loads each section at its VMA,
      #                           then sets PC = entry point)
      #   timeout 30            : kill QEMU after 30 s if semihostingExit()
      #                           is never reached (guards against hangs)
      - name: Run tests (ARM Cortex-M3 / QEMU)
        if: matrix.rtos_cross
        run: |
          timeout 30 qemu-system-arm \
            -machine lm3s6965evb \
            -nographic \
            -semihosting \
            -semihosting-config target=native \
            -kernel build/rtos-test/test_nova_rtos
